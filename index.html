<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Advanced Guess Game</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #6a11cb, #2575fc);
    color: white;
    text-align: center;
    padding-top: 80px;
}.game-box { background: rgba(255,255,255,0.1); padding: 30px; border-radius: 20px; width: 320px; margin: auto; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }

input, button { padding: 10px; border-radius: 10px; border: none; margin-top: 10px; }

button { background: #00c9a7; color: white; cursor: pointer; }

button:hover { background: #00a98f; }

#result { margin-top: 15px; font-weight: bold; } #attempts, #score { margin-top: 10px; } </style>

</head><body>
<div class="game-box">
    <h1>🎮 Guess Game PRO</h1>
    <p>Guess number between 1 - 100</p><input type="number" id="guess" placeholder="Enter number">
<br>
<button onclick="checkGuess()">Check</button>
<button onclick="restartGame()">Restart</button>

<p id="result"></p>
<p id="attempts">Attempts: 0</p>
<p id="score">Score: 100</p>

</div><script>
let number = Math.floor(Math.random()*100)+1;
let attempts = 0;
let score = 100;

function checkGuess(){
    let guess = Number(document.getElementById("guess").value);
    let result = document.getElementById("result");

    if(!guess){
        result.innerText = "⚠️ Enter a number";
        return;
    }

    attempts++;
    score -= 10;

    document.getElementById("attempts").innerText = "Attempts: " + attempts;
    document.getElementById("score").innerText = "Score: " + score;

    if(guess === number){
        result.innerText = "🎉 You win!";
        result.style.color = "#00ffcc";
    }else if(guess < number){
        result.innerText = "📉 Too small";
    }else{
        result.innerText = "📈 Too big";
    }
}

function restartGame(){
    number = Math.floor(Math.random()*100)+1;
    attempts = 0;
    score = 100;
    document.getElementById("result").innerText = "";
    document.getElementById("attempts").innerText = "Attempts: 0";
    document.getElementById("score").innerText = "Score: 100";
    document.getElementById("guess").value = "";
}
</script></body>
</html>
