<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>⚡ RETRO CODE RAID :: The Hacker's Guess ⚡</title>
    <style>
        /* ========== 80s/90s ARCADE + CYBERPUNK VIBE ========== */
        * {
            box-sizing: border-box;
            user-select: none; /* retro kiosk feel */
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at 20% 30%, #021012, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', 'Fira Code', 'VT323', monospace;
            padding: 20px;
            position: relative;
        }

        /* CRT scanline effect + flicker */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 255, 0, 0.03) 0px,
                rgba(0, 255, 0, 0.03) 2px,
                transparent 2px,
                transparent 6px
            );
            z-index: 10;
        }

        /* main terminal cassette */
        .game-box {
            background: #0a0f1ecc;
            backdrop-filter: blur(2px);
            border: 3px solid #0fefb0;
            border-radius: 32px;
            padding: 25px 20px 30px;
            width: 460px;
            max-width: 94%;
            box-shadow: 0 0 0 2px #0a4c3a, 0 20px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,255,170,0.2);
            transition: all 0.2s;
            text-align: center;
            font-weight: bold;
            position: relative;
            background-image: radial-gradient(circle at 10% 20%, rgba(15, 239, 176, 0.08) 2%, transparent 2.5%);
            background-size: 28px 28px;
        }

        /* glitch heading */
        h1 {
            font-size: 2.4rem;
            margin: 0 0 5px;
            font-family: 'Courier New', monospace;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #b3ffe0;
            text-shadow: 3px 3px 0 #005f4a, -1px -1px 0 #00ffaa;
            word-break: keep-all;
            animation: textGlitch 2.2s infinite alternate;
        }

        @keyframes textGlitch {
            0% { text-shadow: 2px 0 #ff00c1, -2px 0 #00ffea; }
            95% { text-shadow: 2px 0 #ff00c1, -2px 0 #00ffea; }
            100% { text-shadow: -2px 0 #ff00c1, 2px 0 #00ffea; }
        }

        .sub {
            font-size: 0.85rem;
            background: #000000aa;
            display: inline-block;
            padding: 5px 15px;
            border-radius: 40px;
            color: #7effcf;
            border: 1px solid #2effb0;
            letter-spacing: 2px;
            margin-bottom: 20px;
        }

        /* retro input group */
        .input-group {
            margin: 20px 0 15px;
        }

        input {
            background: #03070f;
            border: 2px solid #20dd9a;
            font-family: 'Courier New', monospace;
            font-size: 1.7rem;
            text-align: center;
            padding: 12px 8px;
            width: 140px;
            font-weight: bold;
            color: #0effbc;
            outline: none;
            border-radius: 60px;
            letter-spacing: 2px;
            box-shadow: inset 0 0 8px #00bc8c, 0 0 5px #0fefb0;
        }

        input:focus {
            border-color: #fd51ff;
            box-shadow: 0 0 12px #ff66cc, inset 0 0 5px #ff99ee;
            color: #ffcaf5;
        }

        .button-panel {
            display: flex;
            gap: 18px;
            justify-content: center;
            margin: 15px 0 20px;
        }

        button {
            background: #0b1a1a;
            border: none;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            font-size: 1.2rem;
            padding: 10px 24px;
            border-radius: 60px;
            color: #cafff0;
            border-bottom: 3px solid #0e8b6e;
            border-right: 1px solid #26ffb0;
            cursor: pointer;
            transition: all 0.08s linear;
            text-transform: uppercase;
            letter-spacing: 2px;
            backdrop-filter: blur(4px);
        }

        button:hover {
            background: #12a07e;
            color: #010b0f;
            border-bottom-color: #fff2b5;
            transform: scale(0.97);
            box-shadow: 0 0 12px #0efacf;
        }

        button:active {
            transform: translateY(2px);
        }

        /* stat panels */
        .stat-panel {
            background: #010a0ccc;
            border-radius: 30px;
            padding: 10px 15px;
            margin: 12px 0;
            display: flex;
            justify-content: space-between;
            font-size: 1.25rem;
            border: 1px dashed #34eebb;
            font-weight: bold;
        }

        #result {
            background: #00000099;
            padding: 12px;
            border-radius: 40px;
            font-size: 1.4rem;
            margin: 15px 0 5px;
            font-family: monospace;
            letter-spacing: 1px;
            border-left: 5px solid #0fffba;
            text-align: center;
            transition: 0.1s;
        }

        .score-number, .attempts-number {
            color: #eaff84;
            font-size: 1.6rem;
            font-weight: bold;
            background: #00000055;
            padding: 0 8px;
            border-radius: 20px;
            text-shadow: 0 0 4px #fbff9e;
        }

        /* github retro button */
        .github-corner {
            margin-top: 20px;
            display: inline-block;
        }

        .github-corner button {
            background: #2a0833;
            border-bottom: 3px solid #ff55cc;
            font-size: 0.9rem;
            padding: 8px 25px;
        }

        .github-corner button:hover {
            background: #ff55aa;
            color: #000;
        }

        /* blink danger zone */
        .blink-risk {
            animation: pulseRed 0.9s infinite;
            font-weight: bold;
        }

        @keyframes pulseRed {
            0% { text-shadow: 0 0 0px red; opacity: 1; }
            100% { text-shadow: 0 0 6px #ff8833; color: #ffaa77; }
        }

        footer {
            font-size: 0.65rem;
            margin-top: 15px;
            opacity: 0.7;
        }
    </style>
</head>
<body>
<div class="game-box">
    <h1>⚡ ROOT:GUESS⚡</h1>
    <div class="sub">[ CODE INVADER :: 0x7F ]</div>

    <div class="input-group">
        <input type="number" id="guess" placeholder="???" autocomplete="off">
    </div>

    <div class="button-panel">
        <button id="checkBtn">⟳ CHECK ⟳</button>
        <button id="resetBtn">⎚ RESTART ⎚</button>
    </div>

    <div class="stat-panel">
        <span>🔴 ATTEMPTS</span>
        <span id="attempts" class="attempts-number">0</span>
    </div>
    <div class="stat-panel">
        <span>💾 SCORE [BYTE]</span>
        <span id="score" class="score-number">100</span>
    </div>

    <div id="result">▶ [READY] INSERT COIN_</div>
    <footer>⚡ HARD MODE :: PENALTY -9 PER MISS ⚡</footer>
</div>

<div class="github-corner">
    <a href="https://github.com/USERNAME/REPO" target="_blank" style="text-decoration: none;">
        <button>★ STAR ON GITHUB ★</button>
    </a>
</div>

<script>
    // -------------------------------------------------------------
    //  ADVANCED HACKER GUESS GAME :: RETRO CODING LEGEND STYLE
    //  Features: 
    //     - Dynamic penalty scaling (each miss reduces score by 9, but score matters)
    //     - "heat" system - if score drops <= 20, warning lights and difficulty pressure
    //     - Critical fail if score reaches 0 or below → LOCKDOWN (game freeze until restart)
    //     - Smart win messages & DUAL game-over state
    //     - Additional mini-lore: "trace route" hints, zero-guess protection, RNG secrets
    //     - Smooth UX no negative attempts, score cannot go below 0 without triggering lockdown
    //     - Oldschool reference: if guess is out of bounds (1-100) extra penalty but no extra attempts abuse
    //     - BONUS: 'heat mode' increases visual drama when score low
    //     - Attempts counter never artificially inflated
    // -------------------------------------------------------------
    
    // GAME STATE
    let secretNumber = Math.floor(Math.random() * 100) + 1;   // 1-100
    let attemptsCount = 0;
    let currentScore = 100;
    let gameActive = true;          // if false -> game over (lockdown)
    let winLock = false;            // prevent further guesses after win

    // DOM elements
    const guessInput = document.getElementById("guess");
    const resultDiv = document.getElementById("result");
    const attemptsSpan = document.getElementById("attempts");
    const scoreSpan = document.getElementById("score");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const gameBox = document.querySelector(".game-box");

    // Helper: update UI with current stats & apply "critical glow"
    function updateUI() {
        attemptsSpan.innerText = attemptsCount;
        scoreSpan.innerText = Math.max(0, currentScore);
        
        // VISUAL HEAT MODE (retro stress)
        if (currentScore <= 20 && gameActive && !winLock) {
            gameBox.style.boxShadow = "0 0 0 2px #ff4444, 0 0 20px #ff7733, inset 0 0 15px rgba(255,0,0,0.4)";
            gameBox.style.borderColor = "#ff884d";
            resultDiv.style.borderLeftColor = "#ff5500";
            if (currentScore <= 5) {
                resultDiv.classList.add("blink-risk");
            } else {
                resultDiv.classList.remove("blink-risk");
            }
        } else {
            gameBox.style.boxShadow = "0 0 0 2px #0a4c3a, 0 20px 35px rgba(0,0,0,0.6), inset 0 0 20px rgba(0,255,170,0.2)";
            gameBox.style.borderColor = "#0fefb0";
            resultDiv.style.borderLeftColor = "#0fffba";
            resultDiv.classList.remove("blink-risk");
        }
        
        // if game is inactive (lockdown) show brutal theme
        if (!gameActive) {
            gameBox.style.borderColor = "#af2f2f";
            gameBox.style.boxShadow = "0 0 14px #ff2200, inset 0 0 10px #b10000";
            resultDiv.style.borderLeftColor = "#ff2a2a";
        }
        if (winLock && gameActive) {
            // victory shine
            gameBox.style.borderColor = "#f3ff9e";
            gameBox.style.boxShadow = "0 0 18px #f5ff86";
        }
    }
    
    // Lockdown / GAME OVER due to score <= 0
    function triggerLockdown(reason = "SCORE CRITICAL") {
        if (!gameActive) return;
        gameActive = false;
        winLock = true;   // no more guesses allowed
        resultDiv.innerHTML = `💀 [SYSTEM LOCKDOWN] ${reason} 💀<br>⟫ PRESS RESTART ⟪`;
        resultDiv.style.color = "#ff8888";
        resultDiv.style.background = "#2a0404cc";
        updateUI();
    }
    
    // WIN ! sweet victory
    function triggerWin() {
        if (winLock) return;
        winLock = true;
        gameActive = false;   // win ends active guessing (no more checks until restart)
        resultDiv.innerHTML = `🎉✨ ACCESS GRANTED! ✨🎉<br>🔓 YOU CRACKED THE CODE: ${secretNumber}<br>🏆 SCORE: ${currentScore}  |  ATTEMPTS: ${attemptsCount}`;
        resultDiv.style.color = "#e3ffb3";
        resultDiv.style.background = "#0a332acc";
        resultDiv.style.fontWeight = "bold";
        updateUI();
        // add extra glow
        gameBox.style.boxShadow = "0 0 32px #c5ff9e, inset 0 0 25px gold";
    }
    
    // restart everything fresh
    function restartGame() {
        // reset internals
        secretNumber = Math.floor(Math.random() * 100) + 1;
        attemptsCount = 0;
        currentScore = 100;
        gameActive = true;
        winLock = false;
        
        // clear input
        guessInput.value = "";
        // reset result area
        resultDiv.innerHTML = "🔄 SYSTEM REBOOT 🔄<br>▶ New target [1-100]";
        resultDiv.style.color = "#bbffdd";
        resultDiv.style.background = "#00000099";
        resultDiv.classList.remove("blink-risk");
        // update UI numbers
        updateUI();
        
        // extra debug: log new secret? keep hidden but you can console (just for pro mode)
        console.log("[RESTART] secret:", secretNumber);
        // little flair
        resultDiv.style.borderLeftColor = "#0fffba";
        // remove any critical overrides
        gameBox.style.borderColor = "#0fefb0";
    }
    
    // core check logic: retro penalty -9 per wrong guess (more intense)
    // Also bonus "edge guard" if guess out of range => extra warning and -3 additional
    function checkGuess() {
        // if game is locked (dead or win) prevent action except restart
        if (!gameActive || winLock) {
            if (winLock && currentScore > 0 && !gameActive) {
                resultDiv.innerHTML = `🏁 GAME FINISHED. Press RESTART for new session. 🏁`;
            } else if (!gameActive && currentScore <= 0) {
                resultDiv.innerHTML = `⚠️ MAINFRAME HACK FAILED ⚠️<br>PRESS [RESTART] TO RETRY`;
            } else {
                resultDiv.innerHTML = `⌛ GAME OVER / VICTORY LOCKED. Use RESTART.`;
            }
            resultDiv.style.color = "#ffaf6f";
            return;
        }
        
        const rawValue = guessInput.value.trim();
        if (rawValue === "") {
            resultDiv.innerHTML = "⛔ [ERROR] INSERT NUMERIC CODE ⛔";
            resultDiv.style.color = "#ffaa88";
            return;
        }
        let guess = Number(rawValue);
        if (isNaN(guess) || !Number.isInteger(guess)) {
            resultDiv.innerHTML = "⚠️ INVALID INPUT: DECRYPTION FAILED ⚠️";
            resultDiv.style.color = "#ff7777";
            guessInput.value = "";
            return;
        }
        
        // enforce integer range with extra penalty if out of bounds (hacker mistake)
        let outOfRangePenalty = 0;
        if (guess < 1 || guess > 100) {
            outOfRangePenalty = 4;   // extra -4 points for bad range (classic hardcore)
            resultDiv.innerHTML = `❗ [OUT OF RANGE] ${guess} is NOT between 1-100! Penalty +${outOfRangePenalty}❗`;
            resultDiv.style.color = "#ff9966";
            // apply range penalty but still count as attempt?
            // we will reduce score additionally but also count attempts (mess up)
            currentScore -= outOfRangePenalty;
            if (currentScore <= 0) {
                updateUI();
                triggerLockdown("RANGE VIOLATION -> LOST CONNECTION");
                return;
            }
            // we also apply the attempt counter (hacker mistake cost)
            attemptsCount++;
            // after out-of-range, still update UI but we do not proceed to compare secret
            // because it was invalid guess, but we must avoid losing too much? already penalized.
            updateUI();
            guessInput.value = "";
            // show out-of-range feedback but no compare, session continues
            if (currentScore <= 0) {
                triggerLockdown("RUNTIME CORRUPTION");
            } else {
                setTimeout(() => {
                    if (gameActive && !winLock) resultDiv.innerHTML = "⚠️ FOCUS: TARGET RANGE 1-100 ⚠️";
                }, 1000);
            }
            return;
        }
        
        // -------- LEGIT GUESS (within range) ----------
        // Each wrong guess penalizes -9 points (classic high risk)
        // but we apply before checking win, because guessing is risky
        let wrongPenalty = 9;
        // If guess equals secret -> no penalty (we don't deduct for correct guess)
        if (guess !== secretNumber) {
            currentScore -= wrongPenalty;
        }
        
        // increment attempts only when guess is legitimate / within range
        attemptsCount++;
        
        // check for score death before win condition (if score goes <=0 after deduction but guess might be correct?)
        // Edge: if guess correct but deduction made? we should NOT deduct when guess correct.
        // we already prevented deduction for correct guess. So safe.
        
        if (currentScore <= 0) {
            updateUI();
            triggerLockdown("MEMORY LEAK DETECTED - SCORE DEPLETED");
            guessInput.value = "";
            return;
        }
        
        // WIN condition (correct number)
        if (guess === secretNumber) {
            updateUI();   // update attempts and final score
            triggerWin();
            guessInput.value = "";
            return;
        }
        
        // --- wrong guess processing ---
        // Provide "retro assembly hints" with extra style
        let hint = "";
        if (guess < secretNumber) {
            hint = "🔻 TOO LOW [ UNDERFLOW ] 🔻";
        } else {
            hint = "🔺 TOO HIGH [ OVERFLOW ] 🔺";
        }
        
        // Additional "heat seeking" message depending on score
        let riskMsg = "";
        if (currentScore <= 25 && currentScore > 0) {
            riskMsg = " ⚡ CRITICAL INTEGRITY ⚡";
        } else if (currentScore <= 45) {
            riskMsg = " ⚠️ LOW POWER MODE";
        } else {
            riskMsg = "";
        }
        
        resultDiv.innerHTML = `${hint}  |  -${wrongPenalty} BYTES<br>⟫ REMAINING: ${currentScore} HEALTH ⟫${riskMsg}`;
        resultDiv.style.color = "#d0ffb0";
        
        // Update UI stats
        updateUI();
        
        // Autofocus + clear input for next try (retro arcade)
        guessInput.value = "";
        guessInput.focus();
        
        // special crazy feature: if score <= 10 but still alive, twitch effect
        if (currentScore <= 10 && gameActive && !winLock) {
            resultDiv.style.animation = "textGlitch 0.2s infinite";
            setTimeout(() => {
                if (gameActive && !winLock && currentScore > 0) resultDiv.style.animation = "";
            }, 500);
        } else {
            resultDiv.style.animation = "";
        }
    }
    
    // Advanced cheat-protection: Because we are oldschool, keyboard Enter triggers check
    function handleKeyPress(e) {
        if (e.key === "Enter") {
            e.preventDefault();
            if (gameActive && !winLock) {
                checkGuess();
            } else {
                // if game over but press enter remind restart
                resultDiv.innerHTML = "⚠️ GAME INACTIVE → USE RESTART BUTTON ⚠️";
                setTimeout(() => {
                    if (!gameActive && !winLock) resultDiv.innerHTML = "▶ [SYSTEM HALT] PRESS RESTART";
                    else if (winLock && currentScore > 0) resultDiv.innerHTML = "🏆 GAME FINISHED. RESTART FOR NEW GAME 🏆";
                }, 1300);
            }
        }
    }
    
    // Additional Secret dynamic: sometimes restart with easter egg messages
    // attach event listeners
    checkBtn.addEventListener("click", checkGuess);
    resetBtn.addEventListener("click", () => {
        restartGame();
        guessInput.focus();
        // show random retro message reset flavor
        resultDiv.style.animation = "";
        resultDiv.innerHTML = "🌀 RESTART SEQUENCE COMPLETE 🌀<br>GUESS THE HEX CODE 1-100";
        resultDiv.style.color = "#acffde";
        setTimeout(() => {
            if (gameActive && !winLock) resultDiv.innerHTML = "▶ [READY] INSERT COIN_";
        }, 1800);
    });
    document.addEventListener("keydown", handleKeyPress);
    
    // small initialization: show secret in console for debugging but advance players can see (oldschool)
    console.log("[GAME READY] Secret number:", secretNumber);
    
    // bonus: manual update on load
    updateUI();
    guessInput.focus();
    
    // Also add protection against negative score on UI overflow
    // dynamic edge if some weird scenario
    window.addEventListener("load", () => {
        restartGame();   // ensures clean state and random secret
        console.log("🔥 RETRO ROOT GUESS ACTIVATED - HACK THE PLANET 🔥");
    });
    
    // Additional nuance: no infinite scoring, good UX and penalty system builds tension
    // Add extra rule: if attempts reach > 12 but still no win, score penalty injects drama
    // But our core is already vicious, we leave it. Maybe track custom message for attempt master
    // Upgraded advanced gameplay style – true old coder vibe
</script>
</body>
</html>
